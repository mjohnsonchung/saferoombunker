<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1200">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 1200px;
    height: 630px;
    overflow: hidden;
    background: #0D0D0B;
    font-family: 'DM Sans', sans-serif;
    -webkit-font-smoothing: antialiased;
  }

  /* Grid texture */
  .grid {
    position: absolute;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg width='40' height='40' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M40 0H0v40' fill='none' stroke='%23ffffff' stroke-width='0.4' stroke-opacity='0.04'/%3E%3C/svg%3E");
  }

  /* Radial glow */
  .glow {
    position: absolute;
    inset: 0;
    background:
      radial-gradient(ellipse 70% 80% at 15% 50%, rgba(196,150,42,0.07) 0%, transparent 60%),
      radial-gradient(ellipse 40% 40% at 85% 20%, rgba(196,150,42,0.04) 0%, transparent 55%),
      radial-gradient(ellipse 30% 50% at 90% 90%, rgba(196,150,42,0.03) 0%, transparent 50%);
  }

  /* Background bunker schematic — large, low opacity */
  .schematic {
    position: absolute;
    right: -20px;
    top: 50%;
    transform: translateY(-50%);
    opacity: 0.045;
  }

  /* Main content */
  .content {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 0 96px;
  }

  /* Top rule */
  .top-rule {
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 3px;
    background: linear-gradient(to right, #C4962A, #A37B1E 40%, transparent);
  }

  /* Bottom rule */
  .bottom-strip {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    height: 48px;
    background: #141412;
    border-top: 1px solid #2A2A26;
    display: flex;
    align-items: center;
    padding: 0 96px;
    justify-content: space-between;
  }

  .bottom-strip-left {
    font-family: 'DM Sans', sans-serif;
    font-size: 11px;
    font-weight: 400;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: #5C5A54;
  }

  .bottom-strip-right {
    font-family: 'DM Sans', sans-serif;
    font-size: 11px;
    font-weight: 300;
    letter-spacing: 0.1em;
    color: #3A3A36;
  }

  .eyebrow {
    font-family: 'DM Sans', sans-serif;
    font-size: 12px;
    font-weight: 400;
    letter-spacing: 0.26em;
    text-transform: uppercase;
    color: #C4962A;
    margin-bottom: 20px;
  }

  .wordmark {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 108px;
    line-height: 0.88;
    letter-spacing: -0.01em;
    color: #E8E4DC;
    margin-bottom: 28px;
  }

  .wordmark span {
    color: #C4962A;
  }

  .rule {
    width: 52px;
    height: 2px;
    background: #C4962A;
    opacity: 0.7;
    margin-bottom: 24px;
  }

  .tagline {
    font-family: 'DM Serif Display', serif;
    font-style: italic;
    font-size: 26px;
    color: #5C5A54;
    letter-spacing: 0.01em;
    line-height: 1.4;
  }

  /* Vertical accent line */
  .v-line {
    position: absolute;
    right: 380px;
    top: 60px;
    bottom: 60px;
    width: 1px;
    background: linear-gradient(to bottom, transparent, rgba(196,150,42,0.2) 30%, rgba(196,150,42,0.2) 70%, transparent);
  }

  /* Right side stats */
  .stats {
    position: absolute;
    right: 96px;
    top: 50%;
    transform: translateY(-50%);
    width: 240px;
    display: flex;
    flex-direction: column;
    gap: 32px;
  }

  .stat {
    border-left: 2px solid rgba(196,150,42,0.3);
    padding-left: 20px;
  }

  .stat-number {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 44px;
    line-height: 1;
    color: #C4962A;
    letter-spacing: 0.02em;
  }

  .stat-label {
    font-family: 'DM Sans', sans-serif;
    font-size: 10px;
    font-weight: 400;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: #5C5A54;
    margin-top: 4px;
  }
</style>
</head>
<body>

  <div class="grid"></div>
  <div class="glow"></div>

  <!-- Background schematic SVG -->
  <svg class="schematic" width="500" height="500" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
    <!-- Ground line -->
    <line x1="10" y1="80" x2="190" y2="80" stroke="#C4962A" stroke-width="1.5"/>
    <!-- Underground bunker outline -->
    <rect x="30" y="95" width="140" height="80" stroke="#C4962A" stroke-width="1.5"/>
    <!-- Internal divisions -->
    <line x1="80" y1="95" x2="80" y2="175" stroke="#C4962A" stroke-width="0.8"/>
    <line x1="130" y1="95" x2="130" y2="175" stroke="#C4962A" stroke-width="0.8"/>
    <line x1="30" y1="135" x2="190" y2="135" stroke="#C4962A" stroke-width="0.8"/>
    <!-- Entry shaft -->
    <rect x="85" y="60" width="30" height="20" stroke="#C4962A" stroke-width="1.2"/>
    <!-- Hatch -->
    <line x1="85" y1="60" x2="115" y2="60" stroke="#C4962A" stroke-width="1.5"/>
    <!-- Vent shafts -->
    <rect x="40" y="175" width="8" height="15" stroke="#C4962A" stroke-width="0.8"/>
    <rect x="152" y="175" width="8" height="15" stroke="#C4962A" stroke-width="0.8"/>
    <!-- Above ground structure suggestion -->
    <rect x="55" y="45" width="90" height="15" stroke="#C4962A" stroke-width="0.6" stroke-dasharray="4 3" opacity="0.5"/>
    <!-- Depth markers -->
    <line x1="20" y1="80" x2="20" y2="175" stroke="#C4962A" stroke-width="0.6"/>
    <line x1="15" y1="80" x2="25" y2="80" stroke="#C4962A" stroke-width="0.6"/>
    <line x1="15" y1="175" x2="25" y2="175" stroke="#C4962A" stroke-width="0.6"/>
  </svg>

  <div class="top-rule"></div>

  <!-- Main content left -->
  <div class="content" style="width: 820px;">
    <p class="eyebrow">New Zealand · Est. 2018 · NDA from first contact</p>
    <h1 class="wordmark">SAFEROOM <span>&amp;</span><br>BUNKER CO.</h1>
    <div class="rule"></div>
    <p class="tagline">Built Below. Built to Last.</p>
  </div>

  <!-- Vertical divider -->
  <div class="v-line"></div>

  <!-- Right stats -->
  <div class="stats">
    <div class="stat">
      <div class="stat-number">500+</div>
      <div class="stat-label">Plans Licensed</div>
    </div>
    <div class="stat">
      <div class="stat-number">9</div>
      <div class="stat-label">Countries</div>
    </div>
    <div class="stat">
      <div class="stat-number">6</div>
      <div class="stat-label">Years Operating</div>
    </div>
  </div>

  <div class="bottom-strip">
    <span class="bottom-strip-left">Engineer-Certified Underground Bunker Plans</span>
    <span class="bottom-strip-right">saferoombunker.com</span>
  </div>

</body>
</html>
